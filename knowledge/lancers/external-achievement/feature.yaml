# ランサーズ 外部実績表示機能 ドメイン知識
# prd-history/2026-03-14.yaml から骨格を生成。[要確認] はヒアリングで補完が必要な項目

feature:
  name: "外部実績表示機能"
  category: "プロフィール・信頼性"
  description: >
    ランサーがランサーズ外で得た実績（他プラットフォーム・直接取引等）を申請・登録し、
    プロフィール上に表示できる機能。クライアントがランサーの実力を判断する材料となる。

current_user_flow:
  lancer_side:
    steps:
      - step: 1
        action: "外部実績申請フォームにアクセスする"
      - step: 2
        action: "実績情報を入力する（案件名・期間・内容・証拠等）"
      - step: 3
        action: "申請を送信する"
      - step: 4
        action: "運営の審査結果を待つ"
      - step: 5
        action: "承認されるとプロフィールに外部実績が表示される"
    constraints:
      - "審査が必要（自動承認ではない）"
      - "タスク方式の実績は対象外"
      - "証拠となる書類・URLの添付が必要 [要確認: 詳細要件]"
  client_side:
    steps:
      - step: 1
        action: "ランサーのプロフィールで外部実績を閲覧する"
    notes: "外部実績の有無がランサー選定の判断材料になる"

