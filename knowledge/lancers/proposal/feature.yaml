    ideas:
      - "AIによる提案文ドラフト生成（案件要件を読んで自動補完）"
      - "提案文テンプレート提供（カテゴリ別・スキルレベル別）"
      - "提案文品質チェック機能（記入前チェックリスト・AIスコアリング）"
  - category: "提案前ガイダンス"
    ideas:
      - "案件とランサースキルのマッチングスコア表示"
      - "「この案件への勝率予測」表示"
      - "過去の採用提案事例の参考提示（匿名）"
  - category: "プロフィール連携強化"
    ideas:
      - "提案時に関連ポートフォリオを自動サジェスト"
      - "提案と実績の紐付けを強化"
  - category: "クライアント側UX改善"
    ideas:
      - "提案の品質スコア表示（クライアント向けフィルタ）"
      - "低品質提案の自動フィルタリング"

