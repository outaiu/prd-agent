# ランサーズ 提案機能 ドメイン知識
# 対象: ランサーからクライアントへの提案フロー・提案書品質向上
# [要確認] タグはヒアリングで補完が必要な項目

feature:
  name: "ランサーからの提案機能"
  category: "マッチング（提案・応募フロー）"
  description: >
    プロジェクト形式の案件において、ランサーがクライアントの募集に対して提案（応募）を送る機能。
    提案文・希望金額・納期・実績紹介などをまとめた提案書をランサーが作成・送信し、
    クライアントが複数の提案を比較して受注者を選定するマッチングの中核フロー。

current_user_flow:
  lancer_side:
    steps:
      - step: 1
        action: "案件を検索・閲覧する（カテゴリ・キーワード・予算で絞り込み）"
      - step: 2
        action: "案件詳細ページを確認する（依頼内容・予算・納期・クライアント評価を読む）"
      - step: 3
        action: "「提案する」ボタンを押す"
      - step: 4
        action: "提案フォームに記入する（提案文・提案金額・納期・添付ファイル等）"
      - step: 5
        action: "提案を送信する（提案ポイントを消費）"
      - step: 6
        action: "クライアントからのメッセージを待つ"
    constraints:
      - "提案にはポイントが必要（無料会員は提案数に上限あり）"
      - "提案文の文字数制限: [要確認]"
      - "1案件に複数ランサーが提案可能（競争環境）"
  client_side:
    steps:
      - step: 1
        action: "届いた提案一覧を確認する"
      - step: 2
        action: "各提案の内容・金額・ランサーのプロフィール・評価を比較する"
      - step: 3
        action: "気になるランサーにメッセージを送る（ヒアリング）"
      - step: 4
        action: "受注者を選定する（提案を「採用」する）"
      - step: 5
        action: "契約・支払いに進む"

proposal_quality:
  definition: >
    クライアントが提案を受け取ったとき、案件要件への理解・実績の具体性・価格妥当性・
    コミュニケーション意欲が伝わり、「このランサーに依頼したい」と感じさせる提案の質
  client_evaluation_criteria:
    - criterion: "案件要件への理解度"
      description: "クライアントの依頼内容を正確に読み取り、具体的に言及しているか"
      importance: "高"
    - criterion: "実績・ポートフォリオの関連性"
      description: "類似案件の実績・成果物が提示されているか"
      importance: "高"
    - criterion: "提案内容の具体性"
      description: "どのようにやるか（アプローチ・プロセス）が明確か"
      importance: "高"
    - criterion: "価格の妥当性・根拠"
      description: "提案金額に対する根拠・内訳が説明されているか"
      importance: "中"
    - criterion: "納期・スケジュールの現実性"
      description: "納期が要件に合っており、根拠があるか"
      importance: "中"
    - criterion: "コミュニケーション姿勢"
      description: "丁寧さ・熱意・誠実さが伝わるか"
      importance: "中"
    - criterion: "ランサーのプロフィール・評価"
      description: "実績件数・評価スコア・認定ランサー資格"
      importance: "中"
  known_low_quality_patterns:
    - "コピペ・定型文の提案文（案件要件への言及なし）"
    - "提案文が極端に短い（1〜2行程度）"
    - "金額だけ記載で内容がない"
    - "実績・ポートフォリオが未添付"
    - "日本語が不自然・誤字脱字が多い"
    - "クライアントの予算・条件を無視した金額提案"

known_issues:
  lancer_side:
    - issue: "提案文の質が低い（特に初心者・低評価ランサー）"
      evidence: "[要確認: 定量データ]"
      hypothesis: "提案の書き方を知らない・テンプレートがない・フィードバックがない"
    - issue: "提案のコピペ・使い回しが多い"
      evidence: "[要確認]"
      hypothesis: "案件ごとにカスタマイズするコストが高い・効果を実感しにくい"
    - issue: "実績・ポートフォリオの提示が不足"
      evidence: "[要確認]"
      hypothesis: "プロフィール未整備 or 提案時に適切な実績を選ぶ手間がかかる"
    - issue: "提案ポイントを無駄に消費してしまう"
      evidence: "[要確認]"
      hypothesis: "勝ち目のない案件にも提案してしまう・案件選びのスキル不足"
  client_side:
    - issue: "提案が多すぎて選ぶのが大変"
      evidence: "[要確認]"
      hypothesis: "低品質提案が多く、比較コストが高い"
    - issue: "どの提案が良いか判断しにくい"
      evidence: "[要確認]"
      hypothesis: "提案の比較軸・評価基準が明確でない"
    - issue: "メッセージをしても返答が遅い・来ない"
      evidence: "[要確認]"
      hypothesis: "ランサーのレスポンス管理が甘い"
  platform_side:
    - issue: "提案採用率が低い（クライアントが選定を完了しない）"
      evidence: "[要確認: 数値]"
    - issue: "初心者ランサーの受注率が著しく低く離脱につながる"
      evidence: "[要確認]"

related_features:
  - name: "プロフィール・ポートフォリオ機能"
    relationship: "提案時にランサーの実績・スキルが参照される。提案品質と直結"
  - name: "案件検索・推薦機能"
    relationship: "適切な案件に提案できるかはマッチング精度に依存"
  - name: "メッセージ機能"
    relationship: "提案後のクライアントとのやり取りで受注が確定する"
  - name: "評価・レビュー機能"
    relationship: "過去の評価・実績がクライアントの提案評価に影響"
  - name: "認定ランサー制度"
    relationship: "認定バッジが提案の信頼性を補完する"
  - name: "提案ポイント制度"
    relationship: "提案コスト（ポイント消費）が提案行動に影響"

competitor_implementations:
  crowdworks:
    proposal_feature: >
      基本構造はランサーズと類似（提案文・金額・納期）。
      「提案メッセージ」と呼称。テンプレート機能あり（[要確認: 詳細]）。
    quality_initiatives: "[要確認]"
  coconala:
    proposal_feature: >
      ランサー主導の出品型が主流。クライアントからのDM・見積もり依頼に対してランサーが返答する逆引き形式も存在。
      提案文より「サービス説明文」の品質が重要。
    quality_initiatives: "サービス出品時にガイドライン・テンプレートを提供"
  upwork:
    proposal_feature: >
      「Cover Letter」として提案文を送る形式。コネクツ（提案ポイント）を消費。
      AI補助機能（提案文アシスト）を導入済み（2023年〜）。スクリーニング質問に回答する形式も。
    quality_initiatives: "AIによる提案文品質スコア提示・改善サジェスト機能あり"
  fiverr:
    proposal_feature: >
      ランサー出品型が基本。バイヤーリクエストへの入札機能あり。
    quality_initiatives: "[要確認]"

past_decisions:
  - "[要確認: 過去に提案機能で実施した施策・見送った施策]"
  - "[要確認: 提案品質向上のために過去に試みたアプローチ]"

