# ランサーズ 公開プロジェクト・提案選定（AIによる一括選定）機能 ドメイン知識
# 対象: クライアントが受け取った提案をAIで一括評価・選定するフロー
# 初期入力: 「クライアントが公開プロジェクトで提案を選定する際、いちいち提案を確認して見抜くのが大変なので、そこAIに聞いて一括選定できるように」
# [要確認] タグはヒアリングで補完が必要な項目

feature:
  name: "公開プロジェクト・AIによる提案一括選定機能"
  category: "マッチング・検索（クライアント側選定フロー）"
  description: >
    公開プロジェクト形式において、クライアントが受け取った複数の提案を
    AIが一括評価・スコアリングし、最適な候補を推薦する機能。
    クライアントが手動で提案を1件1件読み込んで比較する負荷を軽減し、
    提案選定の効率と精度を向上させることで、マッチング成立率を高める。

primary_user:
  role: "クライアント（発注者）"
  persona: "SMB経営者・大企業部門担当・スタートアップメンバー"
  pain_summary: >
    公開プロジェクトに対して多数の提案が届くが（一案件あたり数件〜数十件）、
    低品質・コピペ提案が多く、どれが本当に要件に合っているかを見極めるために
    膨大な時間がかかる。比較軸も不明確で、判断疲れが起きている。

known_pain_points:
  - pain: "提案が多すぎて全件確認が大変"
    evidence: "[要確認: 定量データ（平均提案受取件数・クライアントの確認完了率）]"
    severity: "重要"
    hypothesis: "一案件あたり10件以上の提案が届くことがあり、全件精読するコストが高い"
  - pain: "低品質・コピペ提案を見抜くのに時間がかかる"
    evidence: "[要確認]"
    severity: "重要"
    hypothesis: "提案文の表面上の丁寧さと実際のスキル・要件合致度の乖離が判断を困難にしている"
  - pain: "比較する際の評価軸が曖昧"
    evidence: "[要確認]"
    severity: "改善希望"
    hypothesis: "クライアント自身が「何を重視すべきか」を整理できていないことがある"
  - pain: "選定が完了せずプロジェクトが放置になる"
    evidence: "[要確認: 提案採用未完了率のデータ]"
    severity: "重要"
    hypothesis: "選定コストの高さが離脱を生み、GMVの機会損失につながっている"
  - pain: "選定後に「こんなはずではなかった」が発生する"
    evidence: "[要確認]"
    severity: "改善希望"
    hypothesis: "提案文だけでは実力・信頼性が判断しきれず、採用ミスマッチが起きる"

current_user_flow:
  client_side:
    steps:
      - step: 1
        action: "プロジェクトの「提案一覧」ページを開く"
      - step: 2
        action: "一覧から提案を1件1件クリックして詳細を確認する"
      - step: 3
        action: "提案文・金額・納期・ランサーのプロフィール・評価を個別に読む"
      - step: 4
        action: "気になるランサーにメッセージで追加質問をする（任意）"
      - step: 5
        action: "受注者を決めて「採用」ボタンを押す"
      - step: 6
        action: "契約・仮払いに進む"
    constraints:
      - "提案一覧の並び順は到着時刻順（または評価順など）[要確認: 現行ソート方式]"
      - "提案ごとに個別ページを開く必要があり、タブが増える・行き来が発生する"
      - "複数提案の比較ビューが存在しない [要確認]"
      - "提案選定に対するガイドライン・評価支援UIが限定的"

desired_outcome:
  statement: >
    クライアントが提案選定にかかる時間・認知負荷を大幅に削減し、
    「本当に要件に合ったランサー」を素早く・自信をもって選定できる状態。
    結果として提案採用率・プロジェクト成約件数（GMV）を向上させる。
  kpi_candidates:
    - "提案採用率（採用数 / 受取提案数）: +10〜20% 改善"
    - "提案選定完了時間（提案一覧アクセスから採用完了まで）: 削減"
    - "プロジェクト成約件数（GMV）: +3〜5% 改善"
    - "クライアントのリピート率・NPS: 向上"
    - "選定後の取引キャンセル率: 低下（品質向上による）"

ai_selection_concept:
  overview: >
    クライアントがプロジェクトの提案一覧ページで「AIに選定を依頼する」ボタン等を押すと、
    AIが全提案を案件要件と照合し、推薦スコア・推薦理由をクライアントに提示する機能。
  evaluation_axes:
    - axis: "案件要件への適合度"
      description: "案件の依頼内容・必要スキル・納期と提案内容の一致度をAIが判定"
      weight_hypothesis: "高"
    - axis: "提案文の具体性・品質"
      description: "コピペ・定型文の検出、案件固有の言及があるか"
      weight_hypothesis: "高"
    - axis: "ランサーの実績・評価との整合性"
      description: "ランサーのスキル・評価スコア・実績件数と案件要件のマッチング"
      weight_hypothesis: "高"
    - axis: "価格・納期の妥当性"
      description: "提案金額・納期が案件予算・希望納期に対して妥当か"
      weight_hypothesis: "中"
    - axis: "コミュニケーション意欲・誠実さ"
      description: "提案文から読み取れるコミュニケーション姿勢の評価"
      weight_hypothesis: "低〜中"
  output_types:
    - "推薦ランサーの順位付き一覧（トップ3〜5件）"
    - "各推薦に対する推薦理由のサマリー（自然言語）"
    - "懸念点・リスクの提示（例: 『実績が少ない』『予算が大幅超過』）"
    - "一括選定ではなく「絞り込み支援」のUI設計も候補 [要確認]"
  user_control:
    - "AIの推薦はあくまで参考。最終決定はクライアントが行う"
    - "評価軸のウェイト調整をクライアントが行えるか [要確認]"
    - "AI推薦を無視して別の提案を選んでも制約なし"

technical_considerations:
  ai_approach_candidates:
    - approach: "LLM（GPT-4o / Claude等）による提案文×案件要件のセマンティック評価"
      pros: "高精度・自然言語での理由説明が得意"
      cons: "APIコスト・レイテンシ・プロンプトエンジニアリングが必要"
    - approach: "ルールベース + MLスコアリング"
      pros: "低コスト・説明可能性が高い"
      cons: "精度が低い可能性・ルールメンテナンスが必要"
    - approach: "ハイブリッド（ルールベースで絞り込み → LLMで最終評価）"
      pros: "コスト効率と精度のバランス"
      cons: "実装複雑度が上がる"
  constraints:
    - "CakePHP 2.8レガシー基盤との統合 [要確認: API呼び出し可能範囲]"
    - "提案文・案件テキストデータの品質・フォーマット統一性 [要確認]"
    - "個人情報・機密情報の外部LLM送信に関する法務確認が必要"
    - "AIの判断根拠をクライアントに説明する責任（説明可能AI）"
    - "ランサーへの公平性・差別的評価の排除"

ost_structure:
  desired_outcome: >
    クライアントが提案選定の時間・認知負荷を削減し、最適なランサーを素早く・自信をもって選定できるようになる。
    結果として提案採用率とプロジェクト成約件数（GMV）が向上する。
  opportunities:
    - opportunity: "提案確認の物量コストが高い（1件1件開く必要がある）"
      why: "クライアントが選定を途中放棄したり、時間コストを嫌って質の低い比較で採用してしまう"
      solutions:
        - "複数提案の横断比較ビュー（サイドバイサイド）"
        - "AIによる提案一括スコアリング・ランキング表示"
        - "低品質提案の自動フィルタリング（一覧から折りたたむ）"
    - opportunity: "評価軸が曖昧で判断に自信が持てない"
      why: "クライアントが「何を見ればよいか」を知らず、表面的な要素（提案文の長さ・丁寧さ）で判断してしまう"
      solutions:
        - "AI推薦理由の自然言語説明（案件要件との適合根拠）"
        - "評価軸ラベル付き提案カード（要件適合度・実績・価格を構造化表示）"
        - "クライアントが重視する軸を指定できる評価設定UI"
    - opportunity: "選定完了しないプロジェクトが多く、GMV機会損失が発生している"
      why: "選定コストの高さが離脱を生み、ランサーにとっても不利益（提案が無駄になる）"
      solutions:
        - "AIによるワンクリック候補提示（3名に絞り込んで提示）"
        - "選定催促・リマインド通知の最適化"
        - "「この提案を見る」マイクロインタラクションによる最初の一歩の軽量化"
    - opportunity: "採用ミスマッチによる取引品質低下"
      why: "提案文の見た目だけでランサーの実力が判断しにくく、採用後トラブルが発生する"
      solutions:
        - "ランサーの過去実績・評価との適合スコア表示"
        - "「このランサーは類似案件の経験あり」バッジ表示"
        - "AI推薦に懸念点（リスク）の明示"
  high_uncertainty_items:
    - item: "LLMによる評価の精度が実際に高いか"
      suggested_experiment: "オフラインで過去の採用提案データとAI推薦の一致率を検証（正解率目標: 70%以上）"
    - item: "クライアントがAI推薦を信頼して使うか（心理的受容性）"
      suggested_experiment: "プロトタイプを使ったユーザビリティテスト（5〜10名）でAI推薦の活用意向を測定"
    - item: "ランサーへの公平性・バイアスの問題"
      suggested_experiment: "推薦ロジックのバイアス検証（特定カテゴリ・国籍・スキルレベルへの偏りチェック）"
    - item: "外部LLM利用の法務・セキュリティ許諾"
      suggested_experiment: "法務・情報セキュリティチームへの事前確認（提案文・案件テキストの外部送信可否）"
    - item: "既存提案選定完了率の現在値（ベースライン）"
      suggested_experiment: "[要確認: データチームへのKPI照会]"

related_features:
  - name: "提案機能（ランサー側）"
    path: "proposal/"
    relationship: "提案送信フローと表裏一体。AIが評価する提案の質は、ランサー側の提案作成フローの改善とセットで考える必要がある"
  - name: "プロフィール・ポートフォリオ機能"
    relationship: "AI評価でランサーの実績・評価スコアを参照する。プロフィールデータの整備度がAI精度に影響"
  - name: "検索・マッチング機能"
    relationship: "案件とランサーの適合スコアリングロジックを共有できる可能性がある"
  - name: "メッセージ機能"
    relationship: "AI推薦後、クライアントが候補ランサーにメッセージを送るフローに連続する"
  - name: "評価・レビュー機能"
    relationship: "過去の評価データがAI推薦のインプットになる"

competitor_implementations:
  crowdworks:
    selection_feature: >
      基本はランサーズと類似の手動選定フロー。
      提案一覧での絞り込みフィルター機能あり（評価・金額等）。
      AIによる提案選定支援は [要確認: 実装状況]。
  coconala:
    selection_feature: >
      ランサー出品型が主流のため、クライアントがランサーを「探す」フローが中心。
      出品サービスの検索・フィルタリング機能が提案選定に相当。
      AIキュレーション機能を一部導入 [要確認: 詳細]。
  upwork:
    selection_feature: >
      2023年よりAI機能を積極導入。「Best Match」表示（AIスコアリングによる推薦順位）。
      提案一覧でのフィルタリング・並び替えが充実。
      AI推薦の理由提示機能は限定的 [要確認]。
    ai_initiatives: "Best Match アルゴリズムによる提案の優先順位付けを先行実装"
  fiverr:
    selection_feature: >
      バイヤーリクエストへの応答として提案が届く。
      AIによるマッチング推薦機能あり（Fiverr Neo等）。
    ai_initiatives: "Fiverr Neo: AI対話によるフリーランサー発掘機能。提案選定ではなく人材探索に特化"

