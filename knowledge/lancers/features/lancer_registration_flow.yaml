# ランサー新規登録フロー 機能レベルドメイン知識
# 作成: 2026-03-16

feature:
  name: "ランサー新規登録フロー"
  category: "ユーザー基盤（オンボーディング/プロフィール/管理）"
  product: "ランサーズ"
  description: >
    ランサー（フリーランス・受注者）がランサーズに新規登録し、
    案件受注・提案が可能な状態になるまでの一連のフロー。

current_flow:
  format: "マルチステップ型"
  estimated_steps: "6〜8ステップ"
  steps_detail: "[要確認: 各ステップの詳細内容]"
  confirmed_required_steps:
    - "メールアドレス登録・メール認証"
    - "基本プロフィール入力（名前・住所・生年月日等）"
    - "スキル・経歴入力"
    - "本人確認（KYC）"
    - "振込口座情報登録"

known_issues:
  - issue: "登録完了率の低下"
    severity: "高"
    detail: "登録フローが長く、途中で離脱するユーザーが増加している"
  - issue: "UX・離脱率の悪化"
    severity: "高"
    detail: "フロー全体のUXが悪く、特定ステップで離脱が集中"

drop_off_analysis:
  primary_drop_off_point: "プロフィール入力ステップ"
  secondary_drop_off_point: "[要確認]"
  data_source: "[要確認: 定量データの有無]"

constraints:
  mandatory:
    - item: "本人確認（KYC）"
      reason: "法的要件（資金決済法等）のため省略不可"
    - item: "振込口座情報登録"
      reason: "報酬支払いのため必須"
  flexible:
    - item: "スキル・ポートフォリオ入力"
      reason: "案件受注には重要だが、登録完了の必須項目にしなくてもよい可能性あり"

ost_structure:
  desired_outcome: "ランサーの登録完了率・アクティベーション率の向上 → GMV増加"
  opportunities:
    - "プロフィール入力ステップでの離脱削減"
    - "必須入力と任意入力の分離による初期ハードル低下"
    - "ソーシャルログイン活用による入力項目削減"
  solutions:
    - "登録フローのステップ数削減（必須のみに絞る）"
    - "任意項目の後回し（登録後にオンボーディングで案内）"
    - "プログレスバーによる進捗可視化"
    - "ソーシャルログイン（Google/SNS）の強化"
  high_uncertainty_items:
    - item: "KYCタイミングの最適化"
      reason: "登録完了直後 vs 初回受注時 のどちらにKYCを移動できるか法務確認が必要"
      suggested_experiment: "KYCを初回受注時に後倒しするA/Bテスト"
    - item: "プロフィール入力最小化の品質影響"
      reason: "プロフィール入力を後回しにした場合、クライアントへのマッチング品質低下リスク"
      suggested_experiment: "登録完了後にオンボーディングメールでプロフィール入力を促す"

improvement_hypotheses:
  - "プロフィール入力を必須→任意に変更することで、登録完了率が向上する"
  - "ソーシャルログインを入力フォームより上位に配置することで、入力コスト低下"
  - "ステップ数を3以下に削減（メール認証 → 基本情報 → 完了）で離脱率改善"

related_features:
  - "ランサープロフィール管理"
  - "本人確認（KYC）機能"
  - "口座登録・出金管理"
  - "オンボーディング（登録後案内）"
  - "ソーシャルログイン"

evidence_items: []

