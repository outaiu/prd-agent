product: "ランサーズ"

# feature フォルダが存在する機能（詳細なドメイン知識あり）
features:
  - name: "提案機能"
    path: "proposal/"
    has_feature_yaml: true
    has_prd_history: true
    last_updated: "2026-03-13"
  - name: "外部実績表示"
    path: "external-achievement/"
    has_feature_yaml: true
    has_prd_history: false
    last_updated: "2026-03-15"
  - name: "公開プロジェクト・AIによる提案一括選定機能"
    path: "proposal-selection/"
    has_feature_yaml: true
    has_prd_history: false
    last_updated: "2026-03-15"

# リポジトリから特定した主要機能領域（feature フォルダはPRD作成時に必要に応じて作成）
feature_catalog:
  - name: "仕事管理"
    scope: "仕事の作成・掲載・検索・募集管理"
  - name: "提案"
    scope: "提案投稿・自動提案・テンプレート・採用・辞退"
    feature_path: "proposal/"
  - name: "プロジェクト契約"
    scope: "採用後の契約・マイルストーン・納品・検収"
  - name: "時給制"
    scope: "時給契約・タイムカード・稼働記録・月次請求"
  - name: "月額契約"
    scope: "固定月額リテイナー契約"
  - name: "決済・エスクロー"
    scope: "仮払い・支払い・請求・返金・出金"
  - name: "ワークスペース"
    scope: "プロジェクト内コラボレーション・コメント・ファイル共有"
  - name: "ユーザー・プロフィール"
    scope: "プロフィール・スキル・ランク・実績・ポートフォリオ"
  - name: "メッセージ"
    scope: "DM・通知・自動メッセージ"
  - name: "検索・マッチング"
    scope: "仕事検索・ランサー検索・レコメンド"
  - name: "エンタープライズ"
    scope: "法人向け機能・グループ管理・ワークフロー"
  - name: "フィードバック・評価"
    scope: "相互評価・スコアリング"
  - name: "認証・本人確認"
    scope: "OAuth・KYC・身分証明"

updated_at: "2026-03-15"
