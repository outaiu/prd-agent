# ランサーズ プロダクトレベル ドメイン知識
# このファイルの構造はヒアリングを通じて拡張・変更される可能性があります
# 公知情報ベースで記入。[要確認] はヒアリングで補完が必要な項目

product:
  name: "ランサーズ"
  type: "BtoB/BtoCマッチングプラットフォーム"
  description: >
    日本最大級のフリーランス・クラウドソーシングプラットフォーム。
    仕事を発注したいクライアント（企業・個人）と、受注したいランサー（フリーランス・副業ワーカー）を繋ぐマーケットプレイス。
    2008年創業、東証グロース上場。「フリーランス・エージェント」サービスも併設し、高度人材の直接マッチングにも対応。

stakeholders:
  - type: "クライアント（発注者）"
    description: "仕事を発注する側。企業・個人事業主が中心"
    personas:
      - "SMB（中小企業）経営者・担当者"
      - "大企業の部門担当者（マーケティング・IT・デザイン）"
      - "スタートアップ創業者/メンバー"
      - "個人事業主"
    key_goal: "要件に合うランサーを素早く見つけ、品質高く・安く仕事を完成させる"
  - type: "ランサー（受注者）"
    description: "仕事を受注するフリーランス・副業ワーカー"
    personas:
      - "副業ワーカー（本業あり・スキルアップ・収入補完目的）"
      - "専業フリーランス（ライター・デザイナー・エンジニア・マーケター等）"
      - "法人・チーム（複数人で受注）"
      - "初心者・学生（実績作り目的）"
    skill_distribution:
      - level: "初心者・低スキル"
        ratio: "[要確認]"
        characteristics: "受注実績少・提案文が定型的・単価が低い"
      - level: "中級"
        ratio: "[要確認]"
        characteristics: "一定の実績あり・カテゴリ特化"
      - level: "上級・プロ"
        ratio: "[要確認]"
        characteristics: "高単価・リピート獲得・専門性高い"

business_model:
  revenue_streams:
    - "システム利用料（取引成立時のランサーからの手数料）: 取引額に応じた段階課金（公知情報では最大20%程度）"
    - "プレミアム会員サービス（ランサー向けサブスク）: 上位表示・提案数拡張等の特典"
    - "Lancers Enterprise: 大企業向け法人契約・マネージドサービス"
    - "フリーランスエージェント: 高度人材紹介手数料"
  pricing_structure: >
    ランサーの手数料: 取引額により段階的（累積実績が高いほど手数料率が下がる仕組み・[詳細要確認]）
    クライアント: 基本無料で発注可能。プレミアムオプションあり
  key_metrics:
    kpi:
      - "GMV（流通取引総額）"
      - "取引件数"
      - "アクティブユーザー数（MAU）"
      - "提案採用率（[要確認]: 公式公表なし）"
      - "リピート受注率"
      - "クライアント継続率"
    nsm:
      - "GMV（流通取引総額）← ユーザー確認済み 2026-03-16"

competitors:
  direct:
    - name: "クラウドワークス"
      notes: "国内最大手。ランサーズと並ぶ2強。幅広いカテゴリ対応"
    - name: "ココナラ"
      notes: "スキルマーケット型。ランサー主導でサービス出品する形式"
    - name: "Upwork"
      notes: "グローバル最大手。英語圏中心。高スキル人材マッチング"
  indirect:
    - name: "Fiverr"
      notes: "グローバルスキルマーケット。定額パッケージ販売"
    - name: "タイミー"
      notes: "スキマバイト特化。短期・単発労働領域で間接競合"
    - name: "Wantedly"
      notes: "採用プラットフォームだが副業人材採用で間接競合"

work_types:
  - type: "プロジェクト"
    description: "ランサーが提案を送り、クライアントが選定。マイルストーン分割払い対応"
  - type: "コンペ"
    description: "複数ランサーが成果物を提出、クライアントが採用作を選ぶ（デザイン・コピー等）"
  - type: "タスク"
    description: "定額・定型の簡易作業。ランサーが作業報告して完了"
  - type: "時給制"
    description: "時間単位の契約。タイムカードで稼働記録し月次請求"
  - type: "月額契約"
    description: "固定月額のリテイナー契約"
  - type: "直接依頼"
    description: "クライアントがランサーを指名して直接依頼。コンペ不要"

payment_flow: "仮払い（エスクロー） → 作業 → 納品 → 検収 → 支払い確定 → ランサーへ出金"

domain_terms:
  - term: "ランサー"
    definition: "仕事を受注するフリーランス・ワーカー（受注者側）"
  - term: "クライアント"
    definition: "仕事を発注する企業・個人（発注者側）"
  - term: "プロジェクト"
    definition: "ランサーが提案を送り、クライアントが選定する通常の発注形式"
  - term: "コンペ"
    definition: "複数のランサーが成果物を提出し、クライアントが採用作を選ぶ形式（デザイン・コピー等）"
  - term: "タスク"
    definition: "クライアントが定額・定型で掲載し、ランサーが作業報告して完了する簡易形式"
  - term: "時給制（Timecharge）"
    definition: "時間単位で契約し、タイムカードで稼働を記録して月次請求する形式"
  - term: "月額契約（Monthly）"
    definition: "固定月額のリテイナー契約。基本契約と個別契約の2種類"
  - term: "パッケージ"
    definition: "ランサーがサービスをパッケージ化して出品するCC型の販売形式（ランサーズでは限定的）"
  - term: "提案"
    definition: "プロジェクト形式でランサーがクライアントの案件に対して送る応募・提案書"
  - term: "自動提案（AutoProposal）"
    definition: "設定条件に合う案件に自動で提案を送る機能。予算範囲・カテゴリ・クライアント条件で制御"
  - term: "マイルストーン"
    definition: "プロジェクトの分割納品・分割払い単位。仮払い→作業→納品→検収のサイクルで管理"
  - term: "エスクロー"
    definition: "仮払い。クライアントが先に支払いを預け、納品完了後にランサーへ支払われる仕組み"
  - term: "認定ランサー"
    definition: "ランサーズが品質・実績を認定した上位ランサー制度"
  - term: "Lancers Enterprise"
    definition: "大企業向けの法人特化サービス。カスタム対応・専任サポート付き"
  - term: "ワークスペース"
    definition: "プロジェクト内のコラボレーション空間。コメント・ファイル共有・ミーティング機能を統合"

technology:
  stack: "CakePHP 2.8 / PHP 8.4 / MySQL / React+TypeScript"
  constraints:
    - "CakePHP 2.8 レガシー基盤のため、大規模リファクタリングには慎重な対応が必要"

updated_at: "2026-03-15"
